<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APIPunchClock — Reportes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>

<div id="navbar-container"></div>

<div class="page-wrapper">
  <div class="container-fluid" style="max-width:1100px">

    <div id="alert-box" class="mb-3"></div>

    <!-- Filtros y acciones -->
    <div class="content-card mb-3">
      <div class="row g-2 align-items-end">
        <div class="col-sm-auto">
          <label class="form-label small fw-semibold mb-1">Días de historial</label>
          <select class="form-select form-select-sm" id="sel-days" onchange="loadReport()">
            <option value="7" selected>Últimos 7 días</option>
            <option value="14">Últimos 14 días</option>
            <option value="30">Últimos 30 días</option>
            <option value="60">Últimos 60 días</option>
          </select>
        </div>
        <div class="col-sm-auto">
          <label class="form-label small fw-semibold mb-1">Filtrar evento</label>
          <select class="form-select form-select-sm" id="sel-event" onchange="filterTable()">
            <option value="">Todos</option>
            <option value="check_in">Solo entradas</option>
            <option value="check_out">Solo salidas</option>
          </select>
        </div>
        <div class="col-sm-auto">
          <label class="form-label small fw-semibold mb-1">Filtrar estado</label>
          <select class="form-select form-select-sm" id="sel-status" onchange="filterTable()">
            <option value="">Todos</option>
            <option value="on_time">A tiempo</option>
            <option value="late">Tardanza</option>
            <option value="flexible">Flexible</option>
          </select>
        </div>
        <div class="col-sm-auto">
          <label class="form-label small fw-semibold mb-1">Buscar</label>
          <input type="text" class="form-control form-control-sm" id="search" placeholder="Nombre o depto…" oninput="filterTable()" style="width:200px">
        </div>
        <div class="col-sm-auto ms-sm-auto">
          <button class="btn btn-sm btn-outline-success" id="btn-export" onclick="doExport()">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="me-1" viewBox="0 0 16 16"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708z"/></svg>
            Exportar CSV
          </button>
        </div>
      </div>
    </div>

    <!-- Resumen rápido -->
    <div class="row g-2 mb-3" id="summary-row">
      <div class="col-4"><div class="content-card p-2 text-center skeleton" style="height:60px"></div></div>
      <div class="col-4"><div class="content-card p-2 text-center skeleton" style="height:60px"></div></div>
      <div class="col-4"><div class="content-card p-2 text-center skeleton" style="height:60px"></div></div>
    </div>

    <!-- Tabla de registros -->
    <div class="content-card">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="fw-semibold mb-0">Registros de asistencia</h6>
        <span class="badge text-bg-light border" id="record-count">—</span>
      </div>
      <div class="table-responsive">
        <table class="table table-hover table-sm">
          <thead>
            <tr>
              <th>Empleado</th>
              <th>Departamento</th>
              <th>Fecha</th>
              <th>Evento</th>
              <th>Hora real</th>
              <th>Hora norm.</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="records-tbody">
            <tr><td colspan="7">
              <div class="skeleton mb-2" style="height:40px;border-radius:6px"></div>
              <div class="skeleton mb-2" style="height:40px;border-radius:6px"></div>
              <div class="skeleton" style="height:40px;border-radius:6px"></div>
            </td></tr>
          </tbody>
        </table>
      </div>
      <div id="pagination" class="d-flex justify-content-between align-items-center mt-2"></div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
  Session.requireAuth();

  let allRecords = [];
  let filtered_  = [];
  const PAGE_SIZE = 25;
  let currentPage = 1;

  // Navbar
  fetch("_navbar.html").then(r=>r.text()).then(html=>{
    document.getElementById("navbar-container").innerHTML = html;
    renderNavUser();
    document.querySelectorAll("[data-page='reports']").forEach(a=>a.classList.add("active"));
  });

  async function loadReport() {
    const days  = parseInt(document.getElementById("sel-days").value);
    const tbody = document.getElementById("records-tbody");

    // Calcular rango en hora local (evita desfase UTC)
    const pad   = n => String(n).padStart(2, "0");
    const fmtD  = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const now   = new Date();
    const start = new Date(now);
    start.setDate(now.getDate() - (days - 1));
    const endDate   = fmtD(now);
    const startDate = fmtD(start);

    try {
      const [rangeRec, dailyData] = await Promise.all([
        Api.clockRange(startDate, endDate),
        Api.dailyReport(days),
      ]);

      allRecords = rangeRec;
      applyFilters();
      renderSummary(dailyData);

    } catch(e) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="alert alert-danger small">${e.detail}</div></td></tr>`;
    }
  }

  function applyFilters() {
    const q       = document.getElementById("search").value.toLowerCase();
    const evFilter= document.getElementById("sel-event").value;
    const stFilter= document.getElementById("sel-status").value;

    filtered_ = allRecords.filter(r => {
      const matchEv = !evFilter || r.event_type === evFilter;
      const matchSt = !stFilter || r.status     === stFilter;
      const matchQ  = !q
        || r.employee_name.toLowerCase().includes(q)
        || r.department.toLowerCase().includes(q);
      return matchEv && matchSt && matchQ;
    });

    currentPage = 1;
    renderPage();
  }

  function filterTable() { applyFilters(); }

  function renderPage() {
    const tbody = document.getElementById("records-tbody");
    const total = filtered_.length;
    const start = (currentPage - 1) * PAGE_SIZE;
    const page  = filtered_.slice(start, start + PAGE_SIZE);

    document.getElementById("record-count").textContent = `${total} registros`;

    if (!page.length) {
      tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4 small">Sin registros</td></tr>`;
      document.getElementById("pagination").innerHTML = "";
      return;
    }

    tbody.innerHTML = page.map(r => `
      <tr>
        <td>
          <span class="avatar-circle me-1" style="width:26px;height:26px;font-size:10px">
            ${r.employee_name.split(" ").slice(0,2).map(w=>w[0]).join("")}
          </span>
          <span class="small">${titleCase(r.employee_name)}</span>
        </td>
        <td><span class="badge text-bg-light border small">${r.department}</span></td>
        <td class="small text-muted">${r.work_date}</td>
        <td>${eventBadge(r.event_type)}</td>
        <td class="small fw-semibold">${fmtTime(r.real_time)}</td>
        <td class="small text-muted">${fmtTime(r.clock_time)}</td>
        <td>${statusBadge(r.status)}</td>
      </tr>`).join("");

    // Paginación
    const totalPages = Math.ceil(total / PAGE_SIZE);
    if (totalPages <= 1) {
      document.getElementById("pagination").innerHTML = "";
      return;
    }
    document.getElementById("pagination").innerHTML = `
      <span class="small text-muted">Página ${currentPage} de ${totalPages}</span>
      <div class="d-flex gap-1">
        <button class="btn btn-sm btn-outline-secondary" ${currentPage===1?"disabled":""} onclick="goPage(${currentPage-1})">‹</button>
        <button class="btn btn-sm btn-outline-secondary" ${currentPage===totalPages?"disabled":""} onclick="goPage(${currentPage+1})">›</button>
      </div>`;
  }

  function goPage(p) { currentPage = p; renderPage(); }

  function renderSummary(dailyData) {
    const totPresent = dailyData.reduce((s,r) => s + r.present, 0);
    const totLate    = dailyData.reduce((s,r) => s + r.late,    0);
    const totAbsent  = dailyData.reduce((s,r) => s + r.absent,  0);
    document.getElementById("summary-row").innerHTML = `
      <div class="col-4">
        <div class="content-card p-2 text-center">
          <div class="fw-bold text-success fs-5">${totPresent}</div>
          <div class="text-muted small">Asistencias</div>
        </div>
      </div>
      <div class="col-4">
        <div class="content-card p-2 text-center">
          <div class="fw-bold text-warning fs-5">${totLate}</div>
          <div class="text-muted small">Tardanzas</div>
        </div>
      </div>
      <div class="col-4">
        <div class="content-card p-2 text-center">
          <div class="fw-bold text-danger fs-5">${totAbsent}</div>
          <div class="text-muted small">Ausencias</div>
        </div>
      </div>`;
  }

  async function doExport() {
    const btn = document.getElementById("btn-export");
    try {
      await withLoading(btn, async () => {
        const res = await Api.exportCsv();
        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href     = url;
        a.download = `asistencia_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        showAlert("alert-box", "✓ CSV descargado correctamente", "success");
      });
    } catch(e) {
      showAlert("alert-box", `Error al exportar: ${e.detail}`, "danger");
    }
  }

  loadReport();
</script>
</body>
</html>
