<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APIPunchClock — Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>

<div id="navbar-container"></div>

<div class="page-wrapper">
  <div class="container-fluid" style="max-width:1100px">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="fw-bold mb-0" id="greeting">Buen día</h4>
        <p class="text-muted small mb-0" id="today-label">—</p>
      </div>
      <button class="btn btn-sm btn-outline-secondary" onclick="loadAll()">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" class="me-1"><path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466"/></svg>
        Actualizar
      </button>
    </div>

    <!-- Stat cards -->
    <div class="row g-3 mb-4" id="stats-row">
      <div class="col-6 col-md-3"><div class="stat-card green skeleton" style="height:88px"></div></div>
      <div class="col-6 col-md-3"><div class="stat-card red skeleton" style="height:88px"></div></div>
      <div class="col-6 col-md-3"><div class="stat-card amber skeleton" style="height:88px"></div></div>
      <div class="col-6 col-md-3"><div class="stat-card blue skeleton" style="height:88px"></div></div>
    </div>

    <div class="row g-3">
      <!-- Gráfica semanal -->
      <div class="col-lg-5">
        <div class="content-card h-100">
          <h6 class="fw-semibold mb-3">Asistencia — últimos 7 días</h6>
          <div id="chart-area">
            <div class="d-flex gap-2 align-items-end justify-content-center" style="height:100px">
              <div class="skeleton" style="width:36px;height:70%"></div>
              <div class="skeleton" style="width:36px;height:55%"></div>
              <div class="skeleton" style="width:36px;height:80%"></div>
              <div class="skeleton" style="width:36px;height:65%"></div>
              <div class="skeleton" style="width:36px;height:90%"></div>
              <div class="skeleton" style="width:36px;height:40%"></div>
            </div>
          </div>
          <div class="d-flex gap-3 mt-3">
            <span class="d-flex align-items-center gap-1 small text-muted">
              <span style="width:10px;height:10px;border-radius:2px;background:#1a1a2e;display:inline-block"></span> Presentes
            </span>
            <span class="d-flex align-items-center gap-1 small text-muted">
              <span style="width:10px;height:10px;border-radius:2px;background:#ffc107;display:inline-block"></span> Tardanzas
            </span>
          </div>
        </div>
      </div>

      <!-- Marcajes de hoy -->
      <div class="col-lg-7">
        <div class="content-card h-100">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="fw-semibold mb-0">Marcajes de hoy</h6>
            <a href="clock.html" class="btn btn-sm btn-dark">Marcar</a>
          </div>
          <div id="today-records-area">
            <div class="skeleton mb-2" style="height:44px;border-radius:8px"></div>
            <div class="skeleton mb-2" style="height:44px;border-radius:8px"></div>
            <div class="skeleton" style="height:44px;border-radius:8px"></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
  Session.requireAuth();

  // Cargar navbar
  fetch("_navbar.html").then(r=>r.text()).then(html=>{
    document.getElementById("navbar-container").innerHTML = html;
    renderNavUser();
    markActiveNav("dashboard");
  });

  function markActiveNav(page) {
    document.querySelectorAll("[data-page]").forEach(a => {
      a.classList.toggle("active", a.dataset.page === page);
    });
  }

  // Saludo y fecha
  const emp = Session.get();
  const now = new Date();
  const hour = now.getHours();
  const greeting = hour < 12 ? "¡Buenos días" : hour < 18 ? "¡Buenas tardes" : "¡Buenas noches";
  document.getElementById("greeting").textContent = `${greeting}, ${titleCase(emp.full_name.split(" ")[0])}!`;
  document.getElementById("today-label").textContent = now.toLocaleDateString("es", {
    weekday:"long", year:"numeric", month:"long", day:"numeric"
  });

  async function loadAll() {
    await Promise.all([loadStats(), loadChart(), loadTodayRecords()]);
  }

  // ── Stats cards ─────────────────────────────────────────────────────
  async function loadStats() {
    try {
      const s = await Api.statsToday();
      document.getElementById("stats-row").innerHTML = `
        <div class="col-6 col-md-3">
          <div class="stat-card green">
            <div class="stat-value text-success">${s.active_today}</div>
            <div class="stat-label">Presentes hoy</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card red">
            <div class="stat-value text-danger">${s.absent_today}</div>
            <div class="stat-label">Ausentes</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card amber">
            <div class="stat-value text-warning">${s.late_today}</div>
            <div class="stat-label">Tardanzas</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card blue">
            <div class="stat-value text-primary">${s.on_time_rate}%</div>
            <div class="stat-label">Puntualidad</div>
          </div>
        </div>`;
    } catch(e) {
      document.getElementById("stats-row").innerHTML =
        `<div class="col-12"><div class="alert alert-danger small">${e.detail}</div></div>`;
    }
  }

  // ── Gráfica ──────────────────────────────────────────────────────────
  async function loadChart() {
    try {
      const rows = await Api.dailyReport(7);
      if (!rows.length) return;
      const maxP = Math.max(...rows.map(r => r.present), 1);
      const days  = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

      const bars = rows.map(row => {
        const dt   = new Date(row.date + "T12:00:00");
        const pct  = Math.round((row.present / maxP) * 80);
        const lPct = Math.round((row.late    / maxP) * 80);
        return `
          <div class="chart-col" title="${row.date}: ${row.present} presentes, ${row.late} tardanzas">
            <div class="bar-bg">
              <div class="bar-fill" style="height:${pct}px;background:#1a1a2e;position:relative">
                ${lPct > 0 ? `<div style="position:absolute;bottom:0;width:100%;height:${lPct}px;background:#ffc107;border-radius:4px 4px 0 0"></div>` : ""}
              </div>
            </div>
            <div class="bar-label">${days[dt.getDay()]}</div>
          </div>`;
      }).join("");
      document.getElementById("chart-area").innerHTML =
        `<div class="chart-bar-wrap">${bars}</div>`;
    } catch(e) { /* silencioso */ }
  }

  // ── Marcajes de hoy ──────────────────────────────────────────────────
  async function loadTodayRecords() {
    const area = document.getElementById("today-records-area");
    try {
      // Admin ve todos; empleado normal solo los suyos
      const empId = emp.is_admin ? null : emp.id;
      const records = await Api.clockToday(empId);

      if (!records.length) {
        area.innerHTML = `
          <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16">
              <path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71z"/>
              <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16m7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0"/>
            </svg>
            <p class="mb-0">Sin marcajes hoy</p>
          </div>`;
        return;
      }

      // Mostrar últimos 8 registros
      const shown = records.slice(0, 8);
      area.innerHTML = `
        <div class="table-responsive">
          <table class="table table-sm table-hover mb-0">
            <thead><tr>
              <th>Empleado</th>
              <th>Evento</th>
              <th>Hora real</th>
              <th>Estado</th>
            </tr></thead>
            <tbody>
              ${shown.map(r => `
                <tr>
                  <td>
                    <span class="avatar-circle me-2" style="width:28px;height:28px;font-size:10px">
                      ${r.employee_name.split(" ").slice(0,2).map(w=>w[0]).join("")}
                    </span>
                    <span class="small">${titleCase(r.employee_name)}</span>
                  </td>
                  <td>${eventBadge(r.event_type)}</td>
                  <td class="small">${fmtTime(r.real_time)}</td>
                  <td>${statusBadge(r.status)}</td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>
        ${records.length > 8 ? `<p class="text-muted small text-end mt-1 mb-0">+${records.length - 8} más — <a href="reports.html">ver todos</a></p>` : ""}`;
    } catch(e) {
      area.innerHTML = `<div class="alert alert-danger small">${e.detail}</div>`;
    }
  }

  loadAll();
</script>
</body>
</html>
