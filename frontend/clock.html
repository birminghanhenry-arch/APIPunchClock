<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APIPunchClock — Marcaje</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>

<div id="navbar-container"></div>

<div class="page-wrapper">
  <div class="container-fluid" style="max-width:720px">

    <div id="alert-box" class="mb-3"></div>

    <div class="row g-3">

      <!-- Panel de marcaje -->
      <div class="col-lg-6">
        <div class="content-card text-center">
          <!-- Reloj en vivo -->
          <div class="clock-display mb-1" id="live-clock">--:--:--</div>
          <p class="text-muted small mb-3" id="live-date">—</p>

          <!-- Info del empleado -->
          <div class="d-flex align-items-center justify-content-center gap-2 mb-3">
            <div class="avatar-circle" id="emp-av">--</div>
            <div class="text-start">
              <div class="fw-semibold small" id="emp-name">—</div>
              <div class="text-muted" style="font-size:12px" id="emp-dept">—</div>
            </div>
          </div>

          <!-- Horario asignado -->
          <div id="schedule-badge-wrap" class="mb-4 d-none">
            <span class="schedule-badge">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" viewBox="0 0 16 16"><path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71z"/><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16m7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0"/></svg>
              <span id="schedule-text">—</span>
            </span>
          </div>

          <!-- Botones -->
          <button class="clock-btn check-in mb-2" id="btn-checkin" onclick="doEvent('check_in')">
            ↑ Registrar Entrada
          </button>
          <button class="clock-btn check-out" id="btn-checkout" onclick="doEvent('check_out')">
            ↓ Registrar Salida
          </button>

          <!-- Estado actual -->
          <div id="status-line" class="mt-3 small text-muted"></div>
        </div>
      </div>

      <!-- Mis marcajes de hoy -->
      <div class="col-lg-6">
        <div class="content-card h-100">
          <h6 class="fw-semibold mb-3">Mis marcajes hoy</h6>
          <div id="my-records">
            <div class="skeleton mb-2" style="height:52px;border-radius:8px"></div>
            <div class="skeleton mb-2" style="height:52px;border-radius:8px"></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
  Session.requireAuth();
  const emp = Session.get();

  // Navbar
  fetch("_navbar.html").then(r=>r.text()).then(html=>{
    document.getElementById("navbar-container").innerHTML = html;
    renderNavUser();
    document.querySelectorAll("[data-page='clock']").forEach(a=>a.classList.add("active"));
  });

  // Info empleado
  document.getElementById("emp-av").textContent   = emp.initials;
  document.getElementById("emp-name").textContent = titleCase(emp.full_name);
  document.getElementById("emp-dept").textContent = emp.department;

  // Reloj en vivo
  const DAYS  = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  const MONTHS= ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  function tick() {
    const n = new Date();
    const p = v => String(v).padStart(2,"0");
    document.getElementById("live-clock").textContent = `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
    document.getElementById("live-date").textContent  = `${DAYS[n.getDay()]} ${n.getDate()} de ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
  }
  tick(); setInterval(tick, 1000);

  // Cargar horario y estado actual
  async function loadPageData() {
    await Promise.all([loadSchedule(), loadMyRecords()]);
  }

  async function loadSchedule() {
    try {
      const asgn = await Api.getAssignment(emp.id);
      if (asgn.jornada1) {
        const j1 = asgn.jornada1;
        let txt = `${j1.shift_name} · ${fmtTime(j1.check_in_time)}–${fmtTime(j1.check_out_time)}`;
        if (asgn.jornada2) {
          const j2 = asgn.jornada2;
          txt += `  /  ${fmtTime(j2.check_in_time)}–${fmtTime(j2.check_out_time)}`;
        }
        document.getElementById("schedule-text").textContent = txt;
        document.getElementById("schedule-badge-wrap").classList.remove("d-none");
      }
    } catch(e) { /* sin horario asignado */ }
  }

  async function loadMyRecords() {
    const area = document.getElementById("my-records");
    try {
      const records = await Api.clockToday(emp.id);
      updateButtonState(records);

      if (!records.length) {
        area.innerHTML = `<div class="empty-state py-4"><p class="mb-0 small">Sin marcajes hoy</p></div>`;
        return;
      }

      area.innerHTML = records.map(r => `
        <div class="d-flex align-items-center justify-content-between p-2 rounded mb-2"
             style="background:${r.event_type==='check_in'?'#d1e7dd':'#f8d7da'}">
          <div>
            ${eventBadge(r.event_type)}
            <span class="ms-1 small fw-semibold">${fmtTime(r.real_time)}</span>
          </div>
          <div class="d-flex align-items-center gap-2">
            ${statusBadge(r.status)}
            <span class="text-muted" style="font-size:11px">${new Date(r.created_at).toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"})}</span>
          </div>
        </div>`).join("");
    } catch(e) {
      area.innerHTML = `<div class="alert alert-danger small">${e.detail}</div>`;
    }
  }

  function updateButtonState(records) {
    const last = records[0];
    const checkinBtn  = document.getElementById("btn-checkin");
    const checkoutBtn = document.getElementById("btn-checkout");
    const statusLine  = document.getElementById("status-line");

    if (!last || last.event_type === "check_out") {
      // puede entrar
      checkinBtn.disabled  = false;
      checkoutBtn.disabled = true;
      statusLine.textContent = last ? `✓ Última salida: ${fmtTime(last.real_time)}` : "";
    } else {
      // está adentro, puede salir
      checkinBtn.disabled  = true;
      checkoutBtn.disabled = false;
      statusLine.innerHTML = `<span class="text-success">● Entrada registrada a las ${fmtTime(last.real_time)}</span>`;
    }
  }

  async function doEvent(eventType) {
    const btn = eventType === "check_in"
      ? document.getElementById("btn-checkin")
      : document.getElementById("btn-checkout");

    document.getElementById("alert-box").innerHTML = "";

    try {
      await withLoading(btn, async () => {
        const result = await Api.clockEvent(emp.id, eventType);
        const label  = eventType === "check_in" ? "Entrada" : "Salida";
        const alertType = result.status === "late" ? "warning" : "success";
        const msg = result.status === "late"
          ? `⚠ ${label} con tardanza registrada a las ${fmtTime(result.real_time)}`
          : `✓ ${label} registrada a las ${fmtTime(result.real_time)}`;
        showAlert("alert-box", msg, alertType);
        await loadMyRecords();
      });
    } catch(err) {
      showAlert("alert-box", err.detail || "Error al registrar", "danger");
    }
  }

  loadPageData();
</script>
</body>
</html>
